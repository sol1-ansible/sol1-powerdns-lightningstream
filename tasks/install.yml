---
# Install lightningstream from packages.sol1.net apt repository
# The package provides /usr/bin/lightningstream and a systemd service

- name: Install lightningstream package
  ansible.builtin.apt:
    name: lightningstream
    state: present
    update_cache: true
    cache_valid_time: 3600


# Clean up artifacts from previous source-compiled installations
- name: Stop old compiled lightningstream service if running from /opt
  ansible.builtin.shell:
    cmd: "systemctl stop lightningstream || true"
  changed_when: false
  when: ansible_facts.services is not defined or true

- name: Remove compiled lightningstream installation
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /opt/lightningstream
    - /etc/profile.d/go.sh
    - /etc/systemd/system/lightningstream.service
  when: 
    - powerdns_lightningstream_cleanup_compiled_installation is defined 
    - powerdns_lightningstream_cleanup_compiled_installation
